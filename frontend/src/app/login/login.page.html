<ion-header>
  <ion-toolbar color="dark">
    <ion-title>UPSGlam 3.0</ion-title>
  </ion-toolbar>
</ion-header>

<ion-content class="ion-padding" color="dark">

  <div class="logo-container">
    <ion-icon name="sparkles-outline" class="logo-icon"></ion-icon>
    <h1>UPSGlam</h1>
    <p>Red social de imágenes con GPU</p>
  </div>

  <ion-item class="custom-item" lines="none">
    <ion-label position="stacked" color="medium">Correo electrónico</ion-label>
    <ion-input
      [(ngModel)]="email"
      type="email"
      placeholder="tu@correo.com"
      style="--color: white;"
    ></ion-input>
  </ion-item>

  <ion-item class="custom-item ion-margin-top" lines="none">
    <ion-label position="stacked" color="medium">Contraseña</ion-label>
    <ion-input
      [(ngModel)]="password"
      type="password"
      placeholder="••••••••"
      style="--color: white;"
    ></ion-input>
  </ion-item>

  <ion-button
    expand="block"
    color="primary"
    class="action-btn ion-margin-top"
    [disabled]="isLoading"
    (click)="login()"
  >
    <ion-spinner *ngIf="isLoading" name="crescent" slot="start"></ion-spinner>
    <ion-icon *ngIf="!isLoading" name="log-in-outline" slot="start"></ion-icon>
    {{ isLoading ? 'Ingresando...' : 'Iniciar Sesión' }}
  </ion-button>

  <ion-button
    expand="block"
    fill="outline"
    color="medium"
    class="action-btn"
    (click)="irARegistro()"
  >
    <ion-icon name="person-add-outline" slot="start"></ion-icon>
    Crear cuenta
  </ion-button>

  <ion-toast
    [isOpen]="toastOpen"
    [message]="toastMessage"
    [color]="toastColor"
    duration="3000"
    position="bottom"
    (didDismiss)="toastOpen = false"
  ></ion-toast>

</ion-content>
